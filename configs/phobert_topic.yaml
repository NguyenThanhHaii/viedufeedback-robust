seed: 42

task:
  name: topic
  label_col: topic_label
  label_name_col: topic_name
  num_labels: 4

model:
  name: vinai/phobert-base
  max_length: 128

training:
  epochs: 4
  train_batch_size: 16
  eval_batch_size: 32
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  early_stopping_patience: 2
  fp16: true

paths:
  train_file: data/processed/train_standardized.csv
  validation_file: data/processed/validation_standardized.csv
  test_file: data/processed/test_standardized.csv
  noisy_eval_file: data/noisy/test_eval_all.csv
  mapping_file: outputs/mappings/topic_label_mapping.json
