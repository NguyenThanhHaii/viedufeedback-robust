seed: 42

data:
  input_test_file: data/processed/test_standardized.csv
  text_col: text

paths:
  noise_dir: data/noisy
  tables_dir: outputs/tables
  figures_dir: outputs/figures
  reports_dir: outputs/reports

sampling:
  examples_per_variant: 20

variants:
  - name: no_accent
    type: remove_diacritics
    level: medium

  - name: typo_light
    type: typo
    level: light
    token_prob: 0.05

  - name: typo_medium
    type: typo
    level: medium
    token_prob: 0.10

  - name: teencode_light
    type: teencode
    level: light
    replace_prob: 0.25

  - name: mixed_light
    type: mixed
    level: light
    remove_diacritics: false
    teencode_prob: 0.25
    typo_token_prob: 0.05

  - name: mixed_no_accent
    type: mixed
    level: medium
    remove_diacritics: true
    teencode_prob: 0.20
    typo_token_prob: 0.04
