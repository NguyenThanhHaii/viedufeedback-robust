project:
  name: ViEduFeedback-Robust
  repo_name: viedufeedback-robust
  seed: 42

dataset:
  name: UIT-VSFC
  source_type: huggingface
  hf_name: uitnlp/vietnamese_students_feedback

  text_col: sentence
  sentiment_col: sentiment
  topic_col: topic
  split_col: split

  sentiment_labels:
    0: negative
    1: neutral
    2: positive

  topic_labels:
    0: lecturer
    1: training_program
    2: facility
    3: others

splits:
  train: train
  dev: validation
  test: test

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  noisy_dir: data/noisy
  outputs_dir: outputs
  mappings_dir: outputs/mappings
  tables_dir: outputs/tables
  figures_dir: outputs/figures
  metrics_dir: outputs/metrics
  predictions_dir: outputs/predictions
  reports_dir: outputs/reports
